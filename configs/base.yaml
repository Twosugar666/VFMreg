# ==================================================================
# 脑磁配准系统 · 基础实验配置（论文最终设置）
# ==================================================================
project: brain-meg-registration
seed: 42
device: cuda

# ----------------------------- 数据 -----------------------------
data:
  root: ./data
  image_size: [1024, 768]
  workers: 8
  head_seg:
    train_parquet: ./data/head_seg/human_parsing/data/train-00000-of-00002-f3a663f7140ee7fd.parquet
    val_parquet:   ./data/head_seg/human_parsing/data/train-00001-of-00002-74610e243c32d5d6.parquet
    classes: 18
  helmet_3d_root: ./data/helmet_3d
  hdri_root:      ./data/hdri/dog_food_bg

# --------------------------- 第3章 分割 --------------------------
seg:
  arch: yolov8n-seg
  weights: ./models/weights/yolo/yolov8n-seg.pt
  epochs: 80
  batch_size: 16
  lr: 1.0e-3
  losses:
    multi_scale_ce:  {p3: 0.5, p4: 0.3, p5: 0.2}
    sobel_edge:      {weight: 0.1, threshold: 0.3}
    combo:           {w_ms: 1.0, w_dice: 0.5, w_edge: 0.1}

# --------------------------- 第4章 NeRF --------------------------
nerf:
  pe_xyz: 10
  pe_dir: 4
  hidden: 256
  layers: 8
  iters: 200000
  batch_rays: 1024
  lr: 5.0e-4
  losses:
    photo:    {weight: 0.5}
    density:  {weight: 1.0}
    lpips:    {weight: 0.1, net: vgg}
    tv:       {weight: 0.01}

# --------------------------- 第5章 VFMReg ------------------------
vfmreg:
  backbone: dinov2_vitl14
  backbone_weights: ./models/weights/dinov3/dinov2_vitl14_pretrain.pth
  freeze_backbone: true
  fusion_layers: 4
  num_views: 2
  stage1:                 # 合成数据预训练
    epochs: 60
    batch_size: 32
    lr: 1.0e-4
    losses:
      pose:   {w_trans: 1.0, w_rot6d: 1.0, w_geo: 0.1, w_hinge: 0.05}
      render: {w_iou: 1.0, w_rgb: 0.5, w_silhouette: 0.2}
  stage2:                 # 真实数据微调
    epochs: 20
    batch_size: 16
    lr: 2.0e-5
    losses:
      pose:   {w_trans: 1.0, w_rot6d: 1.0, w_geo: 0.2, w_hinge: 0.05}
      render: {w_iou: 1.5, w_rgb: 0.3, w_silhouette: 0.3}

# --------------------------- 评估 -----------------------------
eval:
  paper_targets:
    seg:
      mIoU:  0.952
      BF1:   0.897
    nerf:
      trans_mm:  1.2
      rot_deg:   0.9
      success:   0.92
    vfmreg_synth:
      trans_mm:  0.5
      rot_deg:   0.6
    vfmreg_real:
      trans_mm:  0.6
      rot_deg:   0.7
    inference_ms: 15
  tolerance: 0.05         # 验收容差 (5%)

# --------------------------- 日志 -----------------------------
logging:
  out_dir: ./runs
  save_every: 5000
  ckpt_keep: 3
  use_wandb: false
